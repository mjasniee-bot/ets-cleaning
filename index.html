<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ETS Cleaning Inspection</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
margin-top:20px;
}

.gallery img{
width:100%;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
cursor:pointer;
}

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

</style>

</head>

<body>

<h1>ETS Cleaning Inspection Gallery</h1>
<div id="info"></div>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1kKb3MwSUXLsfu2mLKFcygGS27wKMksAMASERRe4ebaE/gviz/tq?tqx=out:json&gid=1632722066";

const params=new URLSearchParams(window.location.search);

const train=params.get("train");

document.getElementById("info").innerHTML="Train Set: "+train;

function addImage(id){

let img=document.createElement("img");

img.src="https://drive.google.com/uc?export=view&id="+id;

document.getElementById("gallery").appendChild(img);

}

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let json=JSON.parse(data.substr(47).slice(0,-2));

let rows=json.table.rows;

rows.forEach(r=>{

let sheetTrain=r.c[7]?.v;

if(sheetTrain==train){

r.c.forEach(cell=>{

if(cell && cell.v){

let text=String(cell.v);

if(text.includes("drive.google.com")){

let ids=text.match(/[-\w]{25,}/g);

if(ids){

ids.forEach(id=>addImage(id));

}

}

}

});

}

});

});


const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

document.addEventListener("click",function(e){

if(e.target.tagName==="IMG"){

lightbox.style.display="flex";
lightboxImg.src=e.target.src;

}

});

lightbox.onclick=function(){
lightbox.style.display="none";
};

</script>

</body>
</html>
