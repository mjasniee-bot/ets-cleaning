<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ETS Cleaning Inspection Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

.filters{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

select,input{
padding:6px;
margin-right:10px;
}

.report{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
}

.debug{
background:#111;
color:#0f0;
padding:15px;
font-family:monospace;
white-space:pre;
margin-top:20px;
}

</style>
</head>

<body>

<h1>ETS Cleaning Inspection Dashboard (DEBUG)</h1>

<div class="filters">

Train
<select id="trainSelect"></select>

Tarikh
<input type="date" id="dateSelect">

Jenis
<select id="typeSelect"></select>

Masa
<select id="timeSelect"></select>

<button onclick="loadReport()">Load Report</button>

</div>

<div class="report" id="report">

<p><b>Train:</b> <span id="train"></span></p>
<p><b>Tarikh:</b> <span id="date"></span></p>
<p><b>Depoh:</b> <span id="depot"></span></p>
<p><b>Jenis:</b> <span id="cleaningType"></span></p>
<p><b>Masa:</b> <span id="startTime"></span></p>
<p><b>Penyelia:</b> <span id="supervisor"></span></p>

</div>

<h2>Sebelum Cucian</h2>
<div class="gallery" id="before"></div>

<h2>Semasa Cucian</h2>
<div class="gallery" id="during"></div>

<h2>Selepas Cucian</h2>
<div class="gallery" id="after"></div>

<div class="debug" id="debug"></div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1kKb3MwSUXLsfu2mLKFcygGS27wKMksAMASERRe4ebaE/gviz/tq?tqx=out:json&gid=1632722066";

let rowsData=[];


/* READ URL PARAMETER */

const params=new URLSearchParams(window.location.search);

const paramTrain=params.get("train");
const paramDate=params.get("date");
const paramType=params.get("type");
const paramTime=params.get("time");


function parseSheetDate(d){

if(!d) return "";

d=String(d);

if(d.startsWith("Date(")){

let p=d.replace("Date(","").replace(")","").split(",");

let y=p[0];
let m=String(Number(p[1])+1).padStart(2,"0");
let day=String(p[2]).padStart(2,"0");

return `${y}-${m}-${day}`;

}

return d;

}


function normalizeTime(t){

if(!t) return "";

t = decodeURIComponent(String(t)).trim();

/* GOOGLE SHEET Date(1899...) */

if(t.startsWith("Date(")){

let p=t.replace("Date(","").replace(")","").split(",");

let h=parseInt(p[3]);
let m=parseInt(p[4]);

return h+":"+m;

}


/* 12:45:00 PM */

if(t.includes("AM") || t.includes("PM")){

let parts=t.split(" ");

let hm=parts[0].split(":");

let h=parseInt(hm[0]);
let m=parseInt(hm[1]);

if(parts[1]=="PM" && h<12) h+=12;
if(parts[1]=="AM" && h==12) h=0;

return h+":"+m;

}


/* 12:45:00 */

if(t.includes(":")){

let hm=t.split(":");

let h=parseInt(hm[0]);
let m=parseInt(hm[1]);

return h+":"+m;

}

return t;

}


function extractDriveIDs(text){

let ids=[];

text=decodeURIComponent(text);

text.split(",").forEach(link=>{

link=link.trim();

if(link.includes("open?id=")){

ids.push(link.split("open?id=")[1]);

}

});

return ids;

}


function renderImages(ids,container){

container.innerHTML="";

ids.forEach(id=>{

let img=document.createElement("img");

img.src="https://lh3.googleusercontent.com/d/"+id+"=w1200";

container.appendChild(img);

});

}


function populateFilters(){

let trains=[...new Set(rowsData.map(r=>r.c[7]?.v))].filter(Boolean);

trains.sort((a,b)=>a-b);

trains.forEach(t=>{
let o=document.createElement("option");
o.value=t;
o.text=t;
trainSelect.appendChild(o);
});


let types=[...new Set(rowsData.map(r=>r.c[5]?.v))].filter(Boolean);

types.forEach(t=>{
let o=document.createElement("option");
o.value=t;
o.text=t;
typeSelect.appendChild(o);
});


let times=[...new Set(rowsData.map(r=>normalizeTime(r.c[3]?.v)))].filter(Boolean);

times.forEach(t=>{
let o=document.createElement("option");
o.value=t;
o.text=t;
timeSelect.appendChild(o);
});

}


function loadReport(){

let train=trainSelect.value;
let date=dateSelect.value;
let type=typeSelect.value;
let time=normalizeTime(timeSelect.value);

let debugText="";

let row=rowsData.find(r=>{

let sheetTrain=r.c[7]?.v;
let sheetDate=parseSheetDate(r.c[2]?.v);
let sheetType=r.c[5]?.v;
let sheetTime=normalizeTime(r.c[3]?.v);

debugText+=`
ROW:
Train=${sheetTrain}
Date=${sheetDate}
Type=${sheetType}
Time=${sheetTime}

`;

return sheetTrain==train &&
sheetDate==date &&
sheetType==type &&
sheetTime==time;

});


debug.innerText=`
URL PARAMETER
Train=${paramTrain}
Date=${paramDate}
Type=${paramType}
Time=${paramTime}

SELECTED
Train=${train}
Date=${date}
Type=${type}
Time=${time}

${debugText}
`;


if(!row){

alert("Data tidak dijumpai");
return;

}

train.innerText=row.c[7]?.v;
date.innerText=parseSheetDate(row.c[2]?.v);
depot.innerText=row.c[6]?.v;
cleaningType.innerText=row.c[5]?.v;
startTime.innerText=normalizeTime(row.c[3]?.v);
supervisor.innerText=row.c[8]?.v;

renderImages(extractDriveIDs(row.c[10]?.v||""),before);
renderImages(extractDriveIDs(row.c[11]?.v||""),during);
renderImages(extractDriveIDs(row.c[12]?.v||""),after);

}


fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let json=JSON.parse(data.substr(47).slice(0,-2));

rowsData=json.table.rows;

populateFilters();

/* AUTO FILL PARAMETER */

if(paramTrain){

trainSelect.value=paramTrain;
dateSelect.value=paramDate;
typeSelect.value=decodeURIComponent(paramType);
timeSelect.value=normalizeTime(paramTime);

}

});

</script>

</body>
</html>
