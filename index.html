<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ETS Cleaning Inspection</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

h1{
margin-bottom:10px;
}

.info{
color:#555;
margin-bottom:20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

.loader{
margin-top:20px;
color:#888;
}

</style>

</head>

<body>

<h1>ETS Cleaning Inspection Gallery</h1>

<div class="info" id="info"></div>

<div class="gallery" id="gallery"></div>

<div class="loader" id="loader">Loading images...</div>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1kKb3MwSUXLsfu2mLKFcygGS27wKMksAMASERRe4ebaE/gviz/tq?tqx=out:json&gid=1632722066";

const params=new URLSearchParams(window.location.search);

const train=params.get("train");

document.getElementById("info").innerHTML="Train Set: "+train;

let imageQueue=[];
let loading=false;
let maxImages=30;

function processQueue(){

if(loading) return;

loading=true;

let batch=imageQueue.splice(0,5);

batch.forEach(id=>{

let img=document.createElement("img");

img.loading="lazy";

img.src="https://lh3.googleusercontent.com/d/"+id;

document.getElementById("gallery").appendChild(img);

});

loading=false;

if(imageQueue.length>0){
setTimeout(processQueue,400);
}else{
document.getElementById("loader").style.display="none";
}

}

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let json=JSON.parse(data.substr(47).slice(0,-2));

let rows=json.table.rows;

rows.forEach(r=>{

let sheetTrain=r.c[7]?.v;

if(sheetTrain==train){

r.c.forEach(cell=>{

if(cell && cell.v){

let text=String(cell.v);

if(text.includes("drive.google.com")){

let ids=text.match(/[-\w]{25,}/g);

if(ids){

ids.forEach(id=>{

if(imageQueue.length<maxImages){
imageQueue.push(id);
}

});

}

}

}

});

}

});

processQueue();

});

const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

document.addEventListener("click",function(e){

if(e.target.tagName==="IMG"){

lightbox.style.display="flex";
lightboxImg.src=e.target.src;

}

});

lightbox.onclick=function(){

lightbox.style.display="none";

};

</script>

</body>
</html>
