<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ETS Cleaning Inspection Gallery</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

h1{
margin-bottom:10px;
}

.section{
margin-top:40px;
}

.section h2{
margin-bottom:15px;
color:#333;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
cursor:pointer;
}

.info{
color:#555;
margin-bottom:20px;
}

</style>

</head>

<body>

<h1>ETS Cleaning Inspection Gallery</h1>
<div class="info" id="info"></div>


<div class="section">
<h2>📷 Sebelum Cucian</h2>
<div class="gallery" id="before"></div>
</div>


<div class="section">
<h2>🧼 Semasa Cucian</h2>
<div class="gallery" id="during"></div>
</div>


<div class="section">
<h2>✨ Selepas Cucian</h2>
<div class="gallery" id="after"></div>
</div>



<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1kKb3MwSUXLsfu2mLKFcygGS27wKMksAMASERRe4ebaE/gviz/tq?tqx=out:json&gid=1632722066";

const params=new URLSearchParams(window.location.search);
const train=params.get("train");

document.getElementById("info").innerHTML="Train Set: "+train;



function extractDriveIDs(text){

let ids=[];

text=decodeURIComponent(text);

let links=text.split(",");

links.forEach(link=>{

link=link.trim();

if(link.includes("open?id=")){

let id=link.split("open?id=")[1];
ids.push(id);

}

});

return ids;

}



function renderImages(ids,container){

ids.forEach(id=>{

let img=document.createElement("img");

img.src="https://lh3.googleusercontent.com/d/"+id+"=w1200";

img.loading="lazy";

container.appendChild(img);

});

}



fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

let json=JSON.parse(data.substr(47).slice(0,-2));

let rows=json.table.rows;

rows.forEach(r=>{

let sheetTrain=r.c[7]?.v;

if(sheetTrain==train){

let before = r.c[10]?.v;
let during = r.c[11]?.v;
let after = r.c[12]?.v;


if(before){

let ids=extractDriveIDs(before);
renderImages(ids,document.getElementById("before"));

}

if(during){

let ids=extractDriveIDs(during);
renderImages(ids,document.getElementById("during"));

}

if(after){

let ids=extractDriveIDs(after);
renderImages(ids,document.getElementById("after"));

}

}

});

});

</script>

</body>
</html>
