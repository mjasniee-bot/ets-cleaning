<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ETS Cleaning Inspection Report</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

h1{
margin-bottom:10px;
}

.report{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.report-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.section{
margin-top:40px;
}

.section h2{
margin-bottom:15px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

#viewer img{
max-width:90%;
max-height:90%;
}

</style>

</head>

<body>

<h1>ETS Cleaning Inspection Report</h1>

<div class="report">
<div class="report-grid">

<div><b>Train Set:</b> <span id="train"></span></div>
<div><b>Tarikh Cucian:</b> <span id="date"></span></div>
<div><b>Depoh:</b> <span id="depot"></span></div>
<div><b>Penyelia:</b> <span id="supervisor"></span></div>
<div><b>Kru:</b> <span id="crew"></span></div>

</div>
</div>


<div class="section">
<h2>📷 Sebelum Cucian</h2>
<div class="gallery" id="before"></div>
</div>


<div class="section">
<h2>🧼 Semasa Cucian</h2>
<div class="gallery" id="during"></div>
</div>


<div class="section">
<h2>✨ Selepas Cucian</h2>
<div class="gallery" id="after"></div>
</div>


<div id="viewer" onclick="closeViewer()">
<img id="viewerImg">
</div>



<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1kKb3MwSUXLsfu2mLKFcygGS27wKMksAMASERRe4ebaE/gviz/tq?tqx=out:json&gid=1632722066";

const params=new URLSearchParams(window.location.search);
const train=params.get("train");

document.getElementById("train").innerText=train;



function extractDriveIDs(text){

let ids=[];

text=decodeURIComponent(text);

let links=text.split(",");

links.forEach(link=>{

link=link.trim();

if(link.includes("open?id=")){

let id=link.split("open?id=")[1];
ids.push(id);

}

});

return ids;

}



function renderImages(ids,container){

ids.forEach(id=>{

let img=document.createElement("img");

img.src="https://lh3.googleusercontent.com/d/"+id+"=w1200";

img.onclick=function(){
openViewer(this.src);
}

container.appendChild(img);

});

}



function openViewer(src){

document.getElementById("viewerImg").src=src;
document.getElementById("viewer").style.display="flex";

}

function closeViewer(){

document.getElementById("viewer").style.display="none";

}



fetch(sheetURL)

.then(res=>res.text())

.then(data=>{

let json=JSON.parse(data.substr(47).slice(0,-2));

let rows=json.table.rows;

rows.forEach(r=>{

let sheetTrain=r.c[7]?.v;

if(sheetTrain==train){

document.getElementById("date").innerText=r.c[2]?.v || "";
document.getElementById("depot").innerText=r.c[6]?.v || "";
document.getElementById("supervisor").innerText=r.c[8]?.v || "";
document.getElementById("crew").innerText=r.c[9]?.v || "";


let before = r.c[10]?.v;
let during = r.c[11]?.v;
let after = r.c[12]?.v;


if(before){

let ids=extractDriveIDs(before);
renderImages(ids,document.getElementById("before"));

}

if(during){

let ids=extractDriveIDs(during);
renderImages(ids,document.getElementById("during"));

}

if(after){

let ids=extractDriveIDs(after);
renderImages(ids,document.getElementById("after"));

}

}

});

});

</script>

</body>
</html>
