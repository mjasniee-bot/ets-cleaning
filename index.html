<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ETS Cleaning Inspection Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

h1{
margin-bottom:20px;
}

.filters{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

select,input{
padding:8px;
margin-right:10px;
}

.report{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.report-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.section{
margin-top:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

button{
padding:10px 15px;
margin-top:15px;
cursor:pointer;
}

#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

#viewer img{
max-width:90%;
max-height:90%;
}

</style>

</head>

<body>

<h1>ETS Cleaning Inspection Dashboard</h1>

<div class="filters">

Train Set
<select id="trainSelect"></select>

Tarikh
<input type="date" id="dateSelect">

<button onclick="exportPDF()">Export PDF</button>

</div>


<div class="report">

<div class="report-grid">

<div><b>Train Set:</b> <span id="train"></span></div>
<div><b>Tarikh Cucian:</b> <span id="date"></span></div>
<div><b>Depoh:</b> <span id="depot"></span></div>
<div><b>Penyelia:</b> <span id="supervisor"></span></div>
<div><b>Kru:</b> <span id="crew"></span></div>

</div>

</div>


<div class="section">
<h2>📷 Sebelum Cucian</h2>
<div class="gallery" id="before"></div>
</div>

<div class="section">
<h2>🧼 Semasa Cucian</h2>
<div class="gallery" id="during"></div>
</div>

<div class="section">
<h2>✨ Selepas Cucian</h2>
<div class="gallery" id="after"></div>
</div>


<div id="viewer" onclick="closeViewer()">
<img id="viewerImg">
</div>


<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1kKb3MwSUXLsfu2mLKFcygGS27wKMksAMASERRe4ebaE/gviz/tq?tqx=out:json&gid=1632722066";

let rowsData=[];



function formatDate(dateStr){

let d=new Date(dateStr);

let day=String(d.getDate()).padStart(2,"0");
let month=String(d.getMonth()+1).padStart(2,"0");
let year=d.getFullYear();

return `${day}/${month}/${year}`;

}



function extractDriveIDs(text){

let ids=[];

text=decodeURIComponent(text);

let links=text.split(",");

links.forEach(link=>{

link=link.trim();

if(link.includes("open?id=")){

let id=link.split("open?id=")[1];
ids.push(id);

}

});

return ids;

}



function renderImages(ids,container){

container.innerHTML="";

ids.forEach(id=>{

let img=document.createElement("img");

img.src="https://lh3.googleusercontent.com/d/"+id+"=w1200";

img.onclick=function(){
openViewer(this.src);
}

container.appendChild(img);

});

}



function openViewer(src){

document.getElementById("viewerImg").src=src;
document.getElementById("viewer").style.display="flex";

}

function closeViewer(){

document.getElementById("viewer").style.display="none";

}



function populateTrainFilter(){

let trains=[...new Set(rowsData.map(r=>r.c[7]?.v))]
.filter(Boolean)
.sort((a,b)=>a-b);

let trainSelect=document.getElementById("trainSelect");

trains.forEach(t=>{

let opt=document.createElement("option");
opt.value=t;
opt.text=t;

trainSelect.appendChild(opt);

});

trainSelect.onchange=updateDateFilter;

updateDateFilter();

}



function updateDateFilter(){

let train=document.getElementById("trainSelect").value;

let dates=rowsData
.filter(r=>r.c[7]?.v==train)
.map(r=>r.c[2]?.v)
.filter(Boolean)
.sort((a,b)=>new Date(b)-new Date(a));

let dateInput=document.getElementById("dateSelect");

if(dates.length>0){

dateInput.value=dates[0];

}

dateInput.onchange=loadReport;

loadReport();

}



function loadReport(){

let train=document.getElementById("trainSelect").value;
let date=document.getElementById("dateSelect").value;

let row=rowsData.find(r=>r.c[7]?.v==train && r.c[2]?.v==date);

if(!row) return;

document.getElementById("train").innerText=train;
document.getElementById("date").innerText=formatDate(date);
document.getElementById("depot").innerText=row.c[6]?.v || "";
document.getElementById("supervisor").innerText=row.c[8]?.v || "";
document.getElementById("crew").innerText=row.c[9]?.v || "";


let before=row.c[10]?.v;
let during=row.c[11]?.v;
let after=row.c[12]?.v;

if(before) renderImages(extractDriveIDs(before),beforeDiv);
if(during) renderImages(extractDriveIDs(during),duringDiv);
if(after) renderImages(extractDriveIDs(after),afterDiv);

}



const beforeDiv=document.getElementById("before");
const duringDiv=document.getElementById("during");
const afterDiv=document.getElementById("after");



function exportPDF(){

window.print();

}



fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let json=JSON.parse(data.substr(47).slice(0,-2));

rowsData=json.table.rows;

populateTrainFilter();

});

</script>

</body>
</html>
