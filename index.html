<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ETS Cleaning Inspection Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

h1{
margin-bottom:20px;
}

.filters{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

select,input{
padding:8px;
margin-right:10px;
}

button{
padding:10px 15px;
cursor:pointer;
}

.report{
display:none;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.badge{
padding:5px 10px;
border-radius:6px;
color:white;
font-weight:bold;
font-size:13px;
}

.badge.normal{background:#3498db;}
.badge.spot{background:#f39c12;}
.badge.deep{background:#e74c3c;}

</style>
</head>

<body>

<h1>ETS Cleaning Inspection Dashboard</h1>

<div class="filters" id="filters">

Train Set
<select id="trainSelect"></select>

Tarikh
<input type="date" id="dateSelect">

Jenis
<select id="typeSelect"></select>

Masa
<select id="timeSelect"></select>

<button onclick="loadReport()">Load Report</button>

</div>


<div class="report" id="report">

<h2>Maklumat Cucian</h2>

<p><b>Train:</b> <span id="train"></span></p>
<p><b>Tarikh:</b> <span id="date"></span></p>
<p><b>Depoh:</b> <span id="depot"></span></p>
<p><b>Jenis:</b> <span id="cleaningType" class="badge"></span></p>
<p><b>Masa:</b> <span id="startTime"></span></p>
<p><b>Penyelia:</b> <span id="supervisor"></span></p>

</div>


<h2>Sebelum Cucian</h2>
<div class="gallery" id="before"></div>

<h2>Semasa Cucian</h2>
<div class="gallery" id="during"></div>

<h2>Selepas Cucian</h2>
<div class="gallery" id="after"></div>


<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1kKb3MwSUXLsfu2mLKFcygGS27wKMksAMASERRe4ebaE/gviz/tq?tqx=out:json&gid=1632722066";

let rowsData=[];

const params = new URLSearchParams(window.location.search);

const paramTrain = params.get("train");
const paramDate = params.get("date");
const paramType = params.get("type");
const paramTime = params.get("time");


function parseSheetDate(d){

if(!d) return "";

d=String(d);

if(d.startsWith("Date(")){

let p=d.replace("Date(","").replace(")","").split(",");

let y=p[0];
let m=String(Number(p[1])+1).padStart(2,"0");
let day=String(p[2]).padStart(2,"0");

return `${y}-${m}-${day}`;

}

return d;

}


function normalizeTime(t){

if(!t) return "";

t = decodeURIComponent(String(t)).trim();

if(t.startsWith("Date(")){

let p = t.replace("Date(","").replace(")","").split(",");

let h = Number(p[3]);
let m = Number(p[4]);

return `${h}:${m}`;

}

/* convert 1:55:00 AM */
if(t.includes("AM") || t.includes("PM")){

let parts = t.split(" ");

let hm = parts[0].split(":");

let h = Number(hm[0]);
let m = Number(hm[1]);

if(parts[1]=="PM" && h<12) h+=12;
if(parts[1]=="AM" && h==12) h=0;

return `${h}:${m}`;

}

return t;

}


function extractDriveIDs(text){

let ids=[];

text=decodeURIComponent(text);

text.split(",").forEach(link=>{

link=link.trim();

if(link.includes("open?id=")){

ids.push(link.split("open?id=")[1]);

}

});

return ids;

}


function renderImages(ids,container){

container.innerHTML="";

ids.forEach(id=>{

let img=document.createElement("img");

img.loading="lazy";

img.src="https://lh3.googleusercontent.com/d/"+id+"=w1200";

container.appendChild(img);

});

}


/* CASCADING FILTER */

function updateFilters(){

let train=trainSelect.value;

let rows=rowsData.filter(r=>r.c[7]?.v==train);

let dates=[...new Set(rows.map(r=>parseSheetDate(r.c[2]?.v)))];

dateSelect.innerHTML="";
dates.forEach(d=>{
let o=document.createElement("option");
o.value=d;
o.text=d;
dateSelect.appendChild(o);
});

}


function loadReport(){

let train=trainSelect.value;
let date=dateSelect.value;
let type=typeSelect.value;
let time=normalizeTime(timeSelect.value);

let row=rowsData.find(r=>{

return r.c[7]?.v==train &&
parseSheetDate(r.c[2]?.v)==date &&
r.c[5]?.v==type &&
normalizeTime(r.c[3]?.v)==normalizeTime(time)

});

if(!row){

alert("Data tidak dijumpai");
return;

}

document.getElementById("report").style.display="block";

document.getElementById("train").innerText=train;
document.getElementById("date").innerText=date;
document.getElementById("depot").innerText=row.c[6]?.v;
document.getElementById("startTime").innerText=normalizeTime(row.c[3]?.v);
document.getElementById("supervisor").innerText=row.c[8]?.v;

let typeBadge=document.getElementById("cleaningType");

typeBadge.innerText=row.c[5]?.v;
typeBadge.className="badge";

renderImages(extractDriveIDs(row.c[10]?.v||""),before);
renderImages(extractDriveIDs(row.c[11]?.v||""),during);
renderImages(extractDriveIDs(row.c[12]?.v||""),after);

}


fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let json=JSON.parse(data.substr(47).slice(0,-2));

rowsData=json.table.rows;

/* populate train */

let trains=[...new Set(rowsData.map(r=>r.c[7]?.v))];

trains.sort((a,b)=>a-b);

trains.forEach(t=>{
let o=document.createElement("option");
o.value=t;
o.text=t;
trainSelect.appendChild(o);
});


/* auto load from lookerstudio */

if(paramTrain){

trainSelect.value=paramTrain;
dateSelect.value=paramDate;
typeSelect.value=decodeURIComponent(paramType);
timeSelect.value=normalizeTime(paramTime);

document.getElementById("filters").style.display="none";

setTimeout(loadReport,500);

}

});

</script>

</body>
</html>
