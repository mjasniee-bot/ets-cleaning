<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ETS Cleaning Inspection Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

.filters{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.report{
display:none;
background:white;
padding:20px;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>ETS Cleaning Inspection Dashboard (DEBUG)</h1>

<div class="filters">

Train Set
<select id="trainSelect"></select>

Tarikh
<input type="date" id="dateSelect">

<button onclick="loadReport()">Load Report</button>

</div>

<div id="report" class="report">
<b>Debug Info</b>
<pre id="debug"></pre>
</div>


<script>

const sheetURL="https://docs.google.com/spreadsheets/d/1kKb3MwSUXLsfu2mLKFcygGS27wKMksAMASERRe4ebaE/gviz/tq?tqx=out:json&gid=1632722066";

let rowsData=[];



function normalizeDate(dateStr){

if(!dateStr) return "";

dateStr = String(dateStr);

/* format Date(2024,1,27) */

if(dateStr.startsWith("Date(")){

let parts=dateStr
.replace("Date(","")
.replace(")","")
.split(",");

let y=parts[0];
let m=String(Number(parts[1])+1).padStart(2,"0");
let d=String(parts[2]).padStart(2,"0");

return `${y}-${m}-${d}`;

}

/* fallback normal date */

let d=new Date(dateStr);

let y=d.getFullYear();
let m=String(d.getMonth()+1).padStart(2,"0");
let day=String(d.getDate()).padStart(2,"0");

return `${y}-${m}-${day}`;

}



function populateTrainFilter(){

let trains=[...new Set(rowsData.map(r=>r.c[7]?.v))]
.filter(Boolean)
.sort((a,b)=>a-b);

let trainSelect=document.getElementById("trainSelect");

trains.forEach(t=>{

let opt=document.createElement("option");
opt.value=t;
opt.text=t;

trainSelect.appendChild(opt);

});

}



function loadReport(){

let train=document.getElementById("trainSelect").value;
let date=document.getElementById("dateSelect").value;

let debugText="";

debugText+="Selected Train: "+train+"\n";
debugText+="Selected Date Input: "+date+"\n";
debugText+="Normalized Input: "+normalizeDate(date)+"\n\n";


rowsData.forEach(r=>{

let sheetTrain=r.c[7]?.v;
let sheetDate=r.c[2]?.v;

let normalizedSheet=normalizeDate(sheetDate);

debugText+="Sheet Train: "+sheetTrain+"\n";
debugText+="Sheet Date Raw: "+sheetDate+"\n";
debugText+="Sheet Date Normalized: "+normalizedSheet+"\n\n";

});


let row=rowsData.find(r => {

let sheetDate = normalizeDate(r.c[2]?.v);
let selectedDate = normalizeDate(date);

return r.c[7]?.v == train && sheetDate == selectedDate;

});

if(row){

debugText+="MATCH FOUND ✅";

}else{

debugText+="NO MATCH ❌";

}

document.getElementById("debug").innerText=debugText;
document.getElementById("report").style.display="block";

}



fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let json=JSON.parse(data.substr(47).slice(0,-2));

rowsData=json.table.rows;

populateTrainFilter();

});

</script>

</body>
</html>
