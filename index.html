<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ETS Cleaning Inspection</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

h1{
margin-bottom:5px;
}

.section{
margin-top:30px;
}

.section h2{
margin-bottom:15px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

</style>

</head>

<body>

<h1>ETS Cleaning Inspection</h1>

<div id="info"></div>

<div class="section">
<h2>Before Cleaning</h2>
<div class="gallery" id="before"></div>
</div>

<div class="section">
<h2>During Cleaning</h2>
<div class="gallery" id="during"></div>
</div>

<div class="section">
<h2>After Cleaning</h2>
<div class="gallery" id="after"></div>
</div>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSdIP_H3YMiK3wdj30CSjJbYKac1q2wqYtgZtPD4YMzuFk7B8kH8-JKpCClA-3dLhEXiRrgC1OeeAJ9/pub?output=csv";

const params=new URLSearchParams(window.location.search);

const train=params.get("train");
const date=params.get("date");

document.getElementById("info").innerHTML=
"Train Set: "+train+" | Date: "+date;

function addImages(container,cell){

if(!cell) return;

let links=cell.split(",");

links.forEach(link=>{

let id=link.match(/[-\w]{25,}/);

if(id){

let imgURL="https://drive.google.com/uc?export=view&id="+id;

let img=document.createElement("img");

img.src=imgURL;

document.getElementById(container).appendChild(img);

}

});

}

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n");

rows.forEach(row=>{

let cols=row.split(",");

if(row.includes(train) && row.includes(date)){

addImages("before",cols[3]);
addImages("during",cols[4]);
addImages("after",cols[5]);

}

});

});

const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

document.addEventListener("click",function(e){

if(e.target.tagName==="IMG"){

lightbox.style.display="flex";
lightboxImg.src=e.target.src;

}

});

lightbox.onclick=function(){

lightbox.style.display="none";

};

</script>

</body>
</html>
