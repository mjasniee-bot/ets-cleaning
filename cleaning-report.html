<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ETS Cleaning Photo Gallery</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

h2{
margin-bottom:20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

</style>

</head>

<body>

<h2>ETS Cleaning Inspection Gallery</h2>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdIP_H3YMiK3wdj30CSjJbYKac1q2wqYtgZtPD4YMzuFk7B8kH8-JKpCClA-3dLhEXiRrgC1OeeAJ9/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

let rows = data.split("\n");

rows.forEach(row=>{

let cols = row.split(",");

cols.forEach(cell=>{

if(cell.includes("drive.google.com")){

let links = cell.split(",");

links.forEach(link=>{

let id = link.match(/[-\w]{25,}/);

if(id){

let imgURL="https://drive.google.com/uc?export=view&id="+id;

let img=document.createElement("img");

img.src=imgURL;

document.getElementById("gallery").appendChild(img);

}

});

}

});

});

});

const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

document.addEventListener("click",function(e){

if(e.target.tagName==="IMG"){

lightbox.style.display="flex";
lightboxImg.src=e.target.src;

}

});

lightbox.onclick=function(){

lightbox.style.display="none";

};

</script>

</body>
</html>
